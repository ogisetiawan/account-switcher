<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chrome extension for switching between multiple account sessions">
    <meta name="author" content="@ogisetiawan">
    <meta name="web_author" content="ogisetiawan.github.io">
    <title>Account Switcher - Chrome Extension</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="app__main" role="main">
        <div id="main-page" class="page">
            <header class="page-header" role="banner">
                <h1 class="page-header__brand">
                    <img src="../assets/img/account-switcher.png" alt="Account Switcher Logo" class="page-header__logo" />
                    <span class="page-header__title">Account Switcher</span>
                </h1>

                <nav class="page-header__nav" role="navigation" aria-label="Main actions">
                    <button type="button" id="addBtn" class="icon-btn" title="Add session" aria-label="Add new session" data-action="add-session">
                        <span class="material-symbols-rounded" aria-hidden="true">add_circle</span>
                    </button>
                    <button type="button" class="icon-btn" title="Save session" aria-label="Save current session" data-action="save-session">
                        <span class="material-symbols-rounded" aria-hidden="true">save</span>
                    </button>
                </nav>
            </header>

            <section class="search" role="search">
                <div class="search__field">
                    <label for="website-search" class="sr-only">Search for websites</label>
                    <span class="material-symbols-rounded search__icon" aria-hidden="true">search</span>
                    <input id="website-search" type="search" class="search__input" placeholder="Find a website..." autocomplete="off" spellcheck="false" data-search="websites" />
                </div>
            </section>

            <section class="site-section" aria-labelledby="website-selection-heading">
                <h2 id="website-selection-heading" class="sr-only">Select Website</h2>
                <div class="site-grid" role="group" aria-label="Available websites"></div>
            </section>
        </div>

        <div id="detail-page" class="page hidden">
            <header class="page-header page-header--detail" role="banner">
                <button type="button" class="icon-btn icon-btn--back" title="Back" aria-label="Back to main page" data-action="back-to-main">
                    <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
                </button>

                <div class="page-header__brand">
                    <img id="detail-site-icon" src="" alt="" class="page-header__site-icon" />
                    <h1 id="detail-site-name" class="page-header__title">Sessions</h1>
                </div>

                <nav class="page-header__nav" role="navigation" aria-label="Main actions">
                    <button type="button" class="icon-btn" title="Add session" aria-label="Add new session" data-action="add-session">
                        <span class="material-symbols-rounded" aria-hidden="true">add_circle</span>
                    </button>
                    <button type="button" class="icon-btn" title="Save session" aria-label="Save current session" data-action="save-session">
                        <span class="material-symbols-rounded" aria-hidden="true">save</span>
                    </button>
                </nav>
            </header>

            <section class="sessions-section" aria-labelledby="sessions-heading">
                <div class="sessions-panel">
                    <header class="sessions-panel__header">
                        <h2 id="sessions-heading" class="sessions-panel__title">
                            Saved Sessions for <span id="detail-site-title">Google</span>
                        </h2>
                        <span id="session-count" aria-live="polite">0 sessions</span>
                    </header>

                    <div class="scrollable-sessions" role="group" aria-labelledby="sessions-heading">
                        <ul id="sessions-list" class="session-list" role="list"></ul>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer" role="contentinfo">
        <div class="footer__actions">
            <button type="button" class="icon-btn" title="Help" aria-label="Help center" data-action="show-help">
                <span class="material-symbols-rounded" aria-hidden="true">help_center</span>
            </button>
            <button type="button" class="icon-btn" title="Settings" aria-label="Settings" data-action="show-settings">
                <span class="material-symbols-rounded" aria-hidden="true">settings</span>
            </button>
        </div>

        <p class="footer__credit">
            <span>© 2025 |</span>
            <img src="../assets/img/logo-mini-qnr.svg" alt="QNR Logo" class="footer__logo" />
            <a class="footer__link" href="https://ogisetiawan.github.io" target="_blank" rel="noopener">qnr.dev</a>
        </p>
    </footer>

    <div id="loading-overlay" class="overlay hidden">
        <div class="overlay__card">
            <div class="loading" aria-hidden="true"></div>
            <span class="overlay__text">Switching session...</span>
        </div>
    </div>

    <div id="saveModal" class="modal hidden">
        <div class="modal__dialog">
            <div class="modal__header">
                <h3 class="modal__title">Save Session</h3>
                <button id="closeSaveModal" type="button" title="Close" aria-label="Close" class="modal__close">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="modal__body">
                <div class="form-field">
                    <label for="websiteUrl" class="form-field__label">Website Address</label>
                    <input type="url" id="websiteUrl" class="form-field__input" placeholder="https://example.com">
                    <div id="websiteUrlError" class="form-field__error hidden"></div>
                </div>
                <div class="form-field">
                    <label for="sessionName" class="form-field__label">Session Name</label>
                    <input type="text" id="sessionName" class="form-field__input" placeholder="My Session">
                    <div id="sessionNameError" class="form-field__error hidden"></div>
                </div>
            </div>
            <div class="modal__footer">
                <button id="cancelSaveModal" type="button" title="Cancel" class="btn btn--secondary">Cancel</button>
                <button id="saveSaveModal" type="button" title="Save session" class="btn btn--primary">
                    <span class="material-symbols-rounded" aria-hidden="true">check</span>
                    <span>Save</span>
                </button>
            </div>
        </div>
    </div>

    <div id="renameModal" class="modal hidden">
        <div class="modal__dialog">
            <div class="modal__header">
                <h3 class="modal__title">Rename Session</h3>
                <button id="closeRenameModal" type="button" title="Close" aria-label="Close" class="modal__close">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="modal__body">
                <div class="form-field">
                    <label for="renameSessionName" class="form-field__label">Session Name</label>
                    <input type="text" id="renameSessionName" class="form-field__input" placeholder="My Session">
                    <div id="renameNameError" class="form-field__error hidden"></div>
                </div>
            </div>
            <div class="modal__footer">
                <button id="cancelRenameModal" type="button" title="Cancel" class="btn btn--secondary">Cancel</button>
                <button id="confirmRenameModal" type="button" title="Rename session" class="btn btn--primary">
                    <span class="material-symbols-rounded" aria-hidden="true">check</span>
                    <span>Rename</span>
                </button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal hidden">
        <div class="modal__dialog">
            <div class="modal__header">
                <h3 id="deleteModalTitle" class="modal__title">Delete Session</h3>
                <button id="closeDeleteModal" type="button" title="Close" aria-label="Close" class="modal__close">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="modal__body">
                <p id="deleteModalMessage" class="modal__text">
                    Are you sure you want to delete this item? This action cannot be undone.
                </p>
            </div>
            <div class="modal__footer">
                <button id="cancelDeleteModal" type="button" title="Cancel" class="btn btn--secondary">Cancel</button>
                <button id="confirmDeleteModal" type="button" title="Delete session" class="btn btn--primary">
                    <span class="material-symbols-rounded" aria-hidden="true">delete</span>
                    <span>Delete</span>
                </button>
            </div>
        </div>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <script src="./index.js" defer></script>
</body>

</html>
