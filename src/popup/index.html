<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chrome extension for switching between multiple account sessions">
    <meta name="author" content="@ogisetiawan">
    <meta name="web_author" content="ogisetiawan.github.io">
    <title>Account Switcher - Chrome Extension</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script> -->

<body class="w-96 min-h-screen flex flex-col">
    <main class="flex flex-col flex-grow bg-gray-50" role="main">
        <!-- /?@ Main Page - Website Selection Grid -->
        <div id="main-page" class="page">
            <!--//?  Header Section -->
            <header class="flex justify-between items-center p-4 pb-2" role="banner">
                <h1 class="flex items-center space-x-2 text-xl font-bold text-gray-800">
                    <img src="../assets/img/account-switcher.png" alt="Account Switcher Logo"
                        class="w-6 h-6 flex-shrink-0" />
                    <span>Account Switcher</span>
                </h1>

                <nav class="flex items-center space-x-1" role="navigation" aria-label="Main actions">
                    <button type="button" id="addBtn" class="p-2 rounded-none hover:bg-gray-200 hover:shadow-md focus-ring"
                        title="Add session" aria-label="Add new session" data-action="add-session">
                        <span class="pt-2 material-symbols-rounded text-gray-600" aria-hidden="true">add_circle</span>
                    </button>

                    <button type="button" class="p-2 rounded-none hover:bg-gray-200 hover:shadow-md focus-ring"
                        title="Save session" aria-label="Save current session" data-action="save-session">
                        <span class="pt-2 material-symbols-rounded text-gray-600" aria-hidden="true">save</span>
                    </button>
                </nav>
            </header>

            <!--//? Search Section -->
            <section class="px-4 mb-4" role="search">
                <div class="relative">
                    <label for="website-search" class="sr-only">Search for websites</label>
                    <span
                        class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"
                        aria-hidden="true">
                        search
                    </span>
                    <input id="website-search" type="search"
                        class="w-full pl-10 pr-4 py-2 bg-white border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-orange-300 transition-all text-base"
                        placeholder="Find a website..." autocomplete="off" spellcheck="false" data-search="websites" />
                </div>
            </section>

            <!--//? Website Selection Grid -->
            <section class="px-4 mb-6 " aria-labelledby="website-selection-heading">
                <h2 id="website-selection-heading" class="sr-only">Select Website</h2>

                <div class="site-grid grid grid-cols-4 gap-4" role="group" aria-label="Available websites">

                </div>
            </section>
        </div>

        <!-- /?@ Halaman Detail - Session List -->
        <div id="detail-page" class="page hidden">
            <!--//? Header with back button -->
            <header class="flex items-center p-4 pb-2 detail-header" role="banner">
                <button type="button"
                    class="p-2 rounded-none hover:bg-gray-200 hover:shadow-md focus-ring mr-2 back-button"
                    title="Back" aria-label="Back to main page" data-action="back-to-main">
                    <span class="material-symbols-rounded text-gray-600 pt-2" aria-hidden="true">arrow_back</span>
                </button>

                <div class="flex items-center space-x-2 flex-1">
                    <img id="detail-site-icon" src="" alt="" class="w-6 h-6 flex-shrink-0" />
                    <h1 id="detail-site-name" class="text-xl font-bold text-gray-800">Sessions</h1>
                </div>

                <nav class="flex items-center space-x-1" role="navigation" aria-label="Main actions">
                    <button type="button" class="p-2 rounded-none hover:bg-gray-200 hover:shadow-md focus-ring"
                        title="Add session" aria-label="Add new session" data-action="add-session">
                        <span class="pt-2 material-symbols-rounded text-gray-600" aria-hidden="true">add_circle</span>
                    </button>

                    <button type="button" class="p-2 rounded-none hover:bg-gray-200 hover:shadow-md focus-ring"
                        title="Save session" aria-label="Save current session" data-action="save-session">
                        <span class="pt-2 material-symbols-rounded text-gray-600" aria-hidden="true">save</span>
                    </button>
                </nav>
            </header>

            <!--//? Sessions List -->
            <section class="flex-grow px-4 pb-20 mt-4" aria-labelledby="sessions-heading">
                <div class="glassmorphism p-4">
                    <header class="flex flex-col items-left mb-4">
                        <h2 id="sessions-heading" class="text-lg font-semibold text-gray-800">
                            Saved Sessions for <span id="detail-site-title">Google</span>
                        </h2>
                        <div class="text-sm text-gray-500" aria-live="polite">
                            <span id="session-count">0 sessions</span>
                        </div>
                    </header>

                    <!--//?  Sessions List Container -->
                    <div class="scrollable-sessions" role="group" aria-labelledby="sessions-heading">
                        <ul id="sessions-list" class="space-y-3" role="list">
                            <!--//? Sessions will be rendered dynamically -->
                        </ul>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- /?@ Footer -->
    <footer
        class="w-full bg-white shadow-[0_-2px_8px_rgba(0,0,0,0.08)] flex items-center justify-between px-4 py-2 mt-auto z-10"
        role="contentinfo">
        <!-- //? Left side: Help dan Settings icons -->
        <div class="flex items-center space-x-0">
            <button type="button" class="p-2 rounded-none hover:bg-gray-200 hover:shadow-md focus-ring"
                title="Help" aria-label="Help center" data-action="show-help">
                <span class="material-symbols-rounded text-gray-600" aria-hidden="true">help_center</span>
            </button>

            <button type="button" class="p-2 rounded-none hover:bg-gray-200 hover:shadow-md focus-ring"
                title="Settings" aria-label="Settings" data-action="show-settings">
                <span class="material-symbols-rounded text-gray-600" aria-hidden="true">settings</span>
            </button>
        </div>

        <!-- //? Right side: Copyright text -->
        <p class="text-sm text-gray-500 flex items-center space-x-2">
            <span>© 2025 |</span>
            <img src="../assets/img/logo-mini-qnr.svg" alt="QNR Logo" class="w-3 h-3 flex-shrink-0 mt-1" />
            <a class="text-orange-500 hover:text-orange-700 transition-colors font-semibold"
                href="https://ogisetiawan.github.io" target="_blank" rel="noopener">
                qnr.dev
            </a>
        </p>

    </footer>


    <!--//@ Loading overlay for better UX -->
    <div id="loading-overlay"
        class="hidden fixed inset-0 modal-blur-background z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 shadow-xl flex items-center space-x-3">
            <div class="loading"></div>
            <span class="text-gray-700">Switching session...</span>
        </div>
    </div>

    <!-- //@ Save Session Modal -->
    <div id="saveModal" class="fixed inset-0 modal-blur-background hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
            <div class="flex items-center justify-between p-6 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900">Save Session</h3>
                <button id="closeSaveModal" title="Close" aria-label="Close" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <label for="websiteUrl" class="block text-sm font-medium text-gray-700 mb-2">Website Address</label>
                    <input type="url" id="websiteUrl" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" placeholder="https://example.com">
                    <div id="websiteUrlError" class="error-message hidden mt-1 text-sm text-red-600"></div>
                </div>
                <div class="mb-6">
                    <label for="sessionName" class="block text-sm font-medium text-gray-700 mb-2">Session Name</label>
                    <input type="text" id="sessionName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" placeholder="My Session">
                    <div id="sessionNameError" class="error-message hidden mt-1 text-sm text-red-600"></div>
                </div>
            </div>
            <div class="modal-flex modal-justify-end space-x-2 p-6 border-t border-gray-200">
                <button id="cancelSaveModal" title="Cancel" class="glassmorphism-btn glassmorphism-btn-secondary px-4 py-2 text-sm font-medium text-gray-700 rounded-lg hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all duration-200">
                    Cancel
                </button>
                <button id="saveSaveModal" title="Save session" class="glassmorphism-btn glassmorphism-btn-primary px-4 py-2 text-sm font-medium text-white rounded-lg hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all duration-200 flex items-center space-x-1">
                    <span class="material-symbols-rounded text-lg" aria-hidden="true">check</span>
                    <span>Save</span>
                </button>
            </div>
        </div>
    </div>

    <!-- //@ Rename Session Modal -->
    <div id="renameModal" class="fixed inset-0 modal-blur-background hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
            <div class="flex items-center justify-between p-6 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900">Rename Session</h3>
                <button id="closeRenameModal" title="Close" aria-label="Close" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <div class="mb-2">
                    <label for="renameSessionName" class="block text-sm font-medium text-gray-700 mb-2">Session Name</label>
                    <input type="text" id="renameSessionName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500" placeholder="My Session">
                    <div id="renameNameError" class="error-message hidden mt-1 text-sm text-red-600"></div>
                </div>
            </div>
            <div class="modal-flex modal-justify-end space-x-2 p-6 border-t border-gray-200">
                <button id="cancelRenameModal" title="Cancel" class="glassmorphism-btn glassmorphism-btn-secondary px-4 py-2 text-sm font-medium text-gray-700 rounded-lg hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all duration-200">
                    Cancel
                </button>
                <button id="confirmRenameModal" title="Rename session" class="glassmorphism-btn glassmorphism-btn-primary px-4 py-2 text-sm font-medium text-white rounded-lg hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all duration-200 flex items-center space-x-1">
                    <span class="material-symbols-rounded text-lg" aria-hidden="true">check</span>
                    <span>Rename</span>
                </button>
            </div>
        </div>
    </div>

    <!-- //@ Delete Session Modal -->
    <div id="deleteModal" class="fixed inset-0 modal-blur-background hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
            <div class="flex items-center justify-between p-6 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900">Delete Session</h3>
                <button id="closeDeleteModal" title="Close" aria-label="Close" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <p class="text-sm text-gray-600">
                    Are you sure you want to delete
                    <span id="deleteSessionName" class="font-semibold text-gray-900"></span>? This action cannot be undone.
                </p>
            </div>
            <div class="modal-flex modal-justify-end space-x-2 p-6 border-t border-gray-200">
                <button id="cancelDeleteModal" title="Cancel" class="glassmorphism-btn glassmorphism-btn-secondary px-4 py-2 text-sm font-medium text-gray-700 rounded-lg hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all duration-200">
                    Cancel
                </button>
                <button id="confirmDeleteModal" title="Delete session" class="glassmorphism-btn px-4 py-2 text-sm font-medium text-white rounded-lg bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 transition-all duration-200 flex items-center space-x-1">
                    <span class="material-symbols-rounded text-lg" aria-hidden="true">delete</span>
                    <span>Delete</span>
                </button>
            </div>
        </div>
    </div>

    <!-- //@ Toast notification -->
    <div id="toast" role="status" aria-live="polite"
        class="hidden fixed bottom-16 left-1/2 -translate-x-1/2 z-50 max-w-[22rem] text-center bg-gray-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg">
    </div>

    <!--//@ Scripts -->
    <script src="./index.js" defer></script>
</body>

</html>
